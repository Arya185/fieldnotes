services:
  - type: web
    name: fieldnotes-demo
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: openai/gpt-oss-120b
      - key: OPENAI_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: FIELDNOTES_USE_FAKE_LLM
        value: "0"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"
