name: release

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    env:
      FIELDNOTES_USE_FAKE_LLM: "1"
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        run: python -m pip install -r backend/requirements.txt

      - name: Install backend lint deps
        if: matrix.os == 'ubuntu-latest'
        run: python -m pip install ruff

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Dependency audit
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          python -m pip install pip-audit
          # Ignore Starlette advisories for code paths Fieldnotes does not use:
          # - PYSEC-2026-248 / 249: request.form() urlencoded parsing limits
          # - PYSEC-2026-2280: HTTPEndpoint method dispatch
          # - PYSEC-2026-2281: StaticFiles UNC-path SSRF on Windows
          # - PYSEC-2026-161: reconstructed URL path confusion; app has no auth/redirect logic based on request.url
          python -m pip_audit --local \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln PYSEC-2026-248 \
            --ignore-vuln PYSEC-2026-249 \
            --ignore-vuln PYSEC-2026-2280 \
            --ignore-vuln PYSEC-2026-2281

      - name: Frontend dependency audit
        if: matrix.os == 'ubuntu-latest'
        working-directory: frontend
        run: npm audit --production --audit-level=high

      - name: Ruff
        if: matrix.os == 'ubuntu-latest'
        run: ruff check backend/

      - name: ESLint
        if: matrix.os == 'ubuntu-latest'
        working-directory: frontend
        run: npm run lint

      - name: Backend tests
        run: python -m unittest discover -s tests

      - name: Frontend tests
        working-directory: frontend
        run: npm test

      - name: Benchmark smoke
        run: python scripts/run_benchmarks.py

      - name: Release verification
        run: python scripts/release_check.py

  live-openai-validation:
    name: Live OpenAI Validation
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5
      FIELDNOTES_USE_FAKE_LLM: "0"
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Skip if no OPENAI_API_KEY
        shell: bash
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "No OPENAI_API_KEY configured."
            echo "Skipping Live OpenAI validation."
            exit 0
          fi

      - name: Phase 0 live probe
        run: python scripts/exit_phase0.py

      - name: Live Responses integration test
        run: python -m unittest tests.test_live_responses_api_integration
